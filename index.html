<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corretor UEM Manual + OCR</title>
<style>
body{font-family:Arial;background:#eef2f7;margin:0;padding:14px}
.app{max-width:900px;margin:auto;background:white;padding:18px;border-radius:18px}
h1,h2{text-align:center;color:#17446b}
input,button{width:100%;box-sizing:border-box;padding:13px;margin-top:8px;border-radius:10px;font-size:16px}
input{border:1px solid #aaa}
button{border:0;background:#17446b;color:white;font-weight:bold}
.questao{background:#f8fafc;border:1px solid #ddd;border-radius:12px;padding:10px;margin-top:8px}
.certo{color:green;font-weight:bold}
.errado{color:red;font-weight:bold}
.nota{text-align:center;font-size:28px;color:#17446b;font-weight:bold}
</style>
</head>
<body>
<div class="app">
<h1>Corretor Inteligente UEM</h1>
<h2>Simulado 1 — Anatomia</h2>

<input id="aluno" placeholder="Nome do aluno">

<div id="campos"></div>

<button onclick="corrigir()">Corrigir prova</button>

<div id="resultado"></div>

<h2>Área da professora</h2>
<input type="password" id="senha" placeholder="Senha">
<button onclick="mostrarGabarito()">Mostrar gabarito</button>
<div id="gabarito"></div>
</div>

<script>
const gabarito=[
"semiespinal",
"levantador das costelas",
"interseccoes tendineas",
"linha alba",
"ligamento amarelo",
"ligamento longitudinal anterior",
"adutor curto",
"musculo coracobraquial",
"musculo romboide maior",
"musculo trapezio porcao ascendente",
"articulacao acromio clavicular",
"ligamento transverso do umero",
"musculo piriforme",
"cabeca curta do biceps braquial",
"ligamento conoide",
"ligamento transverso do joelho",
"musculo flexor radial do carpo",
"musculo flexor curto do dedo minimo",
"musculo latissimo do dorso",
"musculo serratil posterior inferior"
];

const sinonimos={
"lig":"ligamento",
"lig.":"ligamento",
"m":"musculo",
"m.":"musculo",
"art":"articulacao",
"art.":"articulacao",
"ant":"anterior",
"ant.":"anterior",
"long ant":"longitudinal anterior",
"transv":"transverso",
"umero":"umero",
"joelho":"joelho",
"trapezio ascendente":"trapezio porcao ascendente",
"acromio clavicular":"acromio clavicular",
"acromioclavicular":"acromio clavicular",
"conoide":"conoide",
"conóide":"conoide",
"biceps":"biceps",
"bíceps":"biceps"
};

function normalizar(t){
  t=t.toLowerCase()
  .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
  .replace(/[.,;:()_\-]/g," ")
  .replace(/\s+/g," ")
  .trim();

  for(const k in sinonimos){
    t=t.replace(new RegExp("\\b"+k.replace(".","\\.")+"\\b","g"),sinonimos[k]);
  }
  return t;
}

function similaridade(resp,certa){
  resp=normalizar(resp);
  certa=normalizar(certa);

  if(resp.includes(certa) || certa.includes(resp)) return 1;

  const pr=resp.split(" ");
  const pc=certa.split(" ");
  let comuns=0;

  pc.forEach(p=>{
    if(pr.includes(p)) comuns++;
  });

  return comuns/pc.length;
}

function criarCampos(){
  let html="";
  for(let i=1;i<=20;i++){
    html+=`
    <div class="questao">
      <strong>${i}.</strong>
      <input id="q${i}" placeholder="Resposta do aluno ${i}">
    </div>`;
  }
  document.getElementById("campos").innerHTML=html;
}

function corrigir(){
  let acertos=0;
  let html="";
  const aluno=document.getElementById("aluno").value || "Aluno";

  for(let i=1;i<=20;i++){
    const resp=document.getElementById("q"+i).value;
    const certa=gabarito[i-1];
    const score=similaridade(resp,certa);

    if(score>=0.55){
      acertos++;
      html+=`<p><span class="certo">✔ ${i}</span> ${resp}<br><small>Esperado: ${certa}</small></p>`;
    }else{
      html+=`<p><span class="errado">✘ ${i}</span> ${resp || "(em branco)"}<br><small>Esperado: ${certa}</small></p>`;
    }
  }

  const nota=(acertos/20)*10;

  document.getElementById("resultado").innerHTML=
  `<h2>Resultado — ${aluno}</h2>
   <p class="nota">Nota: ${nota.toFixed(1)} / 10</p>
   <p><strong>Acertos:</strong> ${acertos} de 20</p>
   ${html}`;
}

function mostrarGabarito(){
  if(document.getElementById("senha").value!=="2026"){
    alert("Senha incorreta");
    return;
  }

  let html="<h3>Gabarito</h3><ol>";
  gabarito.forEach(g=>html+=`<li>${g}</li>`);
  html+="</ol>";
  document.getElementById("gabarito").innerHTML=html;
}

criarCampos();
</script>
</body>
</html>
