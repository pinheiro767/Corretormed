<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversor de Acertos em Nota</title>
<link rel="manifest" href="manifest.json">

<style>
body{
  font-family:Arial, sans-serif;
  background:#eef2f7;
  margin:0;
  padding:20px;
}

.app{
  max-width:950px;
  margin:auto;
  background:#fff;
  padding:22px;
  border-radius:16px;
  box-shadow:0 4px 14px rgba(0,0,0,.15);
}

h1,h2{
  text-align:center;
  margin:5px;
}

h1{
  color:#263238;
}

label{
  font-weight:bold;
  display:block;
  margin-top:12px;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #aaa;
  font-size:16px;
}

button{
  margin-top:12px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#263238;
  color:#fff;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:25px;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th{
  background:#263238;
  color:#fff;
}

tr:nth-child(even){
  background:#f5f5f5;
}

.ok{
  color:green;
  font-weight:bold;
}

.baixo{
  color:#c62828;
  font-weight:bold;
}

.resumo{
  margin-top:20px;
  background:#e3f2fd;
  padding:12px;
  border-radius:10px;
}

@media print{
  button,input,label{
    display:none;
  }

  body{
    background:#fff;
  }

  .app{
    box-shadow:none;
  }
}
</style>
</head>

<body>

<div class="app">

<h1>Universidade Estadual de Maringá</h1>
<h2>DCM — Anatomia Humana</h2>
<h2>Conversor de Acertos em Nota</h2>

<label>Valor total desta etapa (ex: 0.4)</label>
<input type="number" id="notaMaxima" value="0.4" step="0.01">

<label>Total de questões</label>
<input type="number" id="totalQuestoes" value="20">

<label>Nota mínima satisfatória</label>
<input type="number" id="notaMinima" value="0.24" step="0.01">

<button onclick="calcular()">Converter Notas</button>
<button onclick="window.print()">Imprimir / Salvar PDF</button>

<table>
<thead>
<tr>
<th>Nº</th>
<th>Acadêmico(a)</th>
<th>Acertos</th>
<th>Nota</th>
<th>Situação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<div class="resumo" id="resumo"></div>

</div>

<script>

const alunos = [
{n:1,nome:"Gabriela Favaram Tronco",acertos:19},
{n:2,nome:"Laura Aboni",acertos:14},
{n:3,nome:"Ana Júlia R. Paulista",acertos:12},
{n:4,nome:"Isabelle Justina",acertos:10},
{n:5,nome:"Ana Campanin",acertos:15},
{n:6,nome:"Camila Aparecida Neves Santos",acertos:15},
{n:7,nome:"Mateus de Brito Oliveira",acertos:12},
{n:8,nome:"Ezequiel Santos",acertos:3},
{n:9,nome:"Enzo",acertos:6},
{n:10,nome:"Wallace Gabriel",acertos:9},
{n:11,nome:"Muriana",acertos:6},
{n:12,nome:"Heitor F. M. Barrigo Junior",acertos:19},
{n:13,nome:"Victor H. Figueiredo",acertos:11},
{n:14,nome:"Armando Nogello Junior",acertos:12},
{n:15,nome:"Filipa Ribeiro Palhono",acertos:8},
{n:16,nome:"João Gabriel Corrêa",acertos:16},
{n:17,nome:"Nicole Budiz",acertos:11},
{n:18,nome:"Lisa Aimi",acertos:10},
{n:19,nome:"Evelyn Giovanna V. Fariña",acertos:15},
{n:20,nome:"Kauã Barros",acertos:15},
{n:21,nome:"Marta S. Dick",acertos:18}
];

function calcular(){

const notaMaxima = Number(document.getElementById("notaMaxima").value);
const totalQuestoes = Number(document.getElementById("totalQuestoes").value);
const notaMinima = Number(document.getElementById("notaMinima").value);

const tabela = document.getElementById("tabela");
tabela.innerHTML = "";

let soma = 0;
let maior = 0;
let menor = notaMaxima;

alunos.forEach(aluno=>{

// REGRA CORRETA:
// 20 acertos = 0,4
// menos acertos calcula proporcionalmente

const nota = (aluno.acertos / totalQuestoes) * notaMaxima;

soma += nota;
maior = Math.max(maior, nota);
menor = Math.min(menor, nota);

const situacao = nota >= notaMinima ? "Satisfatório" : "Atenção";
const classe = nota >= notaMinima ? "ok" : "baixo";

tabela.innerHTML += `
<tr>
<td>${aluno.n}</td>
<td style="text-align:left">${aluno.nome}</td>
<td>${aluno.acertos}/${totalQuestoes}</td>
<td>${nota.toFixed(2).replace(".",",")}</td>
<td class="${classe}">${situacao}</td>
</tr>
`;

});

const media = soma / alunos.length;

document.getElementById("resumo").innerHTML = `
<strong>Total de alunos:</strong> ${alunos.length}<br>
<strong>Valor total da etapa:</strong> ${notaMaxima.toFixed(2).replace(".",",")}<br>
<strong>Média da turma:</strong> ${media.toFixed(2).replace(".",",")}<br>
<strong>Maior nota:</strong> ${maior.toFixed(2).replace(".",",")}<br>
<strong>Menor nota:</strong> ${menor.toFixed(2).replace(".",",")}
`;

}

if("serviceWorker" in navigator){
 navigator.serviceWorker.register("sw.js");
}

calcular();

</script>

</body>
</html>
