<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversor de Acertos em Nota</title>
<link rel="manifest" href="manifest.json">

<style>
body{
  font-family:Arial,sans-serif;
  background:#eef2f7;
  margin:0;
  padding:20px;
}

.app{
  max-width:950px;
  margin:auto;
  background:white;
  padding:22px;
  border-radius:16px;
  box-shadow:0 4px 14px rgba(0,0,0,.15);
}

h1,h2{
  text-align:center;
  margin:5px;
}

h1{
  color:#263238;
}

label{
  font-weight:bold;
  display:block;
  margin-top:12px;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #aaa;
  font-size:16px;
}

button{
  margin-top:12px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#263238;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.btn-claro{
  background:#607d8b;
}

.calculadora{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:#f1f8ff;
  display:none;
}

.resultado-calc{
  margin-top:12px;
  padding:12px;
  background:white;
  border-radius:10px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
  border:1px solid #b0bec5;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:25px;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th{
  background:#263238;
  color:white;
}

tr:nth-child(even){
  background:#f5f5f5;
}

.resumo{
  margin-top:20px;
  background:#e3f2fd;
  padding:12px;
  border-radius:10px;
}

@media print{
  button,input,label,.calculadora{
    display:none;
  }

  body{
    background:white;
  }

  .app{
    box-shadow:none;
  }
}
</style>
</head>

<body>

<div class="app">

<h1>Universidade Estadual de Maringá</h1>
<h2>DCM — Anatomia Humana</h2>
<h2>Conversor de Acertos em Nota</h2>

<label>Valor total da atividade</label>
<input type="number" id="notaMaxima" value="0.4" step="0.01">

<label>Total de questões</label>
<input type="number" id="totalQuestoes" value="20">

<button onclick="calcular()">Converter Notas da Turma</button>
<button class="btn-claro" onclick="abrirCalculadora()">Abrir / Fechar Calculadora Individual</button>
<button onclick="window.print()">Imprimir / Salvar PDF</button>

<div class="calculadora" id="calculadora">
  <h2>Calculadora Individual</h2>

  <label>Acertos do aluno</label>
  <input type="number" id="acertosIndividual" value="20">

  <label>Total de questões</label>
  <input type="number" id="questoesIndividual" value="20">

  <label>Valor total da atividade</label>
  <input type="number" id="valorIndividual" value="0.4" step="0.01">

  <button onclick="calcularIndividual()">Calcular Nota Individual</button>

  <div class="resultado-calc" id="resultadoIndividual">
    Resultado: —
  </div>
</div>

<table>
<thead>
<tr>
<th>Nº</th>
<th>Acadêmico(a)</th>
<th>Acertos</th>
<th>Nota</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<div class="resumo" id="resumo"></div>

</div>

<script>
const alunos = [
{n:1,nome:"Gabriela Favaram Tronco",acertos:19},
{n:2,nome:"Laura Aboni",acertos:14},
{n:3,nome:"Ana Júlia R. Paulista",acertos:12},
{n:4,nome:"Isabelle Justina",acertos:10},
{n:5,nome:"Ana Campanin",acertos:15},
{n:6,nome:"Camila Aparecida Neves Santos",acertos:15},
{n:7,nome:"Mateus de Brito Oliveira",acertos:12},
{n:8,nome:"Ezequiel Santos",acertos:3},
{n:9,nome:"Enzo",acertos:6},
{n:10,nome:"Wallace Gabriel",acertos:9},
{n:11,nome:"Mariana",acertos:6},
{n:12,nome:"Heitor F. M. Barrigo Junior",acertos:19},
{n:13,nome:"Victor H. Figueiredo",acertos:11},
{n:14,nome:"Armando Nogello Junior",acertos:12},
{n:15,nome:"Filipa Ribeiro Palhono",acertos:8},
{n:16,nome:"João Gabriel Corrêa",acertos:16},
{n:17,nome:"Nicole Budiz",acertos:11},
{n:18,nome:"Lisa Aimi",acertos:10},
{n:19,nome:"Evelyn Giovanna V. Fariña",acertos:15},
{n:20,nome:"Kauã Barros",acertos:15},
{n:21,nome:"Marta S. Dick",acertos:18}
];

function formatar(valor){
  return valor.toFixed(2).replace(".", ",");
}

function calcular(){
  const notaMaxima = Number(document.getElementById("notaMaxima").value);
  const totalQuestoes = Number(document.getElementById("totalQuestoes").value);

  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  let soma = 0;
  let maior = 0;
  let menor = notaMaxima;

  alunos.forEach(aluno=>{
    const nota = (aluno.acertos / totalQuestoes) * notaMaxima;

    soma += nota;
    maior = Math.max(maior, nota);
    menor = Math.min(menor, nota);

    tabela.innerHTML += `
      <tr>
        <td>${aluno.n}</td>
        <td style="text-align:left">${aluno.nome}</td>
        <td>${aluno.acertos}/${totalQuestoes}</td>
        <td>${formatar(nota)}</td>
      </tr>
    `;
  });

  const media = soma / alunos.length;

  document.getElementById("resumo").innerHTML = `
    <strong>Total de alunos:</strong> ${alunos.length}<br>
    <strong>Regra:</strong> ${totalQuestoes} acertos = ${formatar(notaMaxima)} ponto(s)<br>
    <strong>Média da turma:</strong> ${formatar(media)}<br>
    <strong>Maior nota:</strong> ${formatar(maior)}<br>
    <strong>Menor nota:</strong> ${formatar(menor)}
  `;
}

function abrirCalculadora(){
  const calc = document.getElementById("calculadora");
  calc.style.display = calc.style.display === "none" || calc.style.display === "" ? "block" : "none";
}

function calcularIndividual(){
  const acertos = Number(document.getElementById("acertosIndividual").value);
  const total = Number(document.getElementById("questoesIndividual").value);
  const valor = Number(document.getElementById("valorIndividual").value);

  const nota = (acertos / total) * valor;

  document.getElementById("resultadoIndividual").innerHTML =
    `${acertos} acertos em ${total} questões = ${formatar(nota)} ponto(s)`;
}

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

calcular();
</script>

</body>
</html>
